    <script type="text/babel">
        

        function RollDiceRoot()
        {
            const playerCount = 1;
            const [player, setPlayer] = React.useState(1);
            
            document.getElementById('diceNumberTxt').value = Math.floor(Math.random() * 6) + 1;
            document.getElementById('playerTurn').innerHTML = 'Player '+player+' turn:';

            function HandleRoll()
            {
                const rollNum = document.getElementById('diceNumberTxt').value;
                //Math.floor(Math.random() * 6) + 1;
                
                if (isNaN(rollNum)) {
                    alert('Please use number only');
                    return;
                }
                if(Number(rollNum) < 1 || Number(rollNum) > 6)
                {
                    alert('Please use dice number between 1 to 6');
                    return;
                }

                console.log('player ' + player);

                document.getElementById('diceNumber').innerHTML = 'Dice number: ' + rollNum;
                console.log('roll dice ' + rollNum);
                
                

                //get current player position
                let positionPly = Number(document.getElementById('p'+player+'pos').innerHTML);
                //console.log('positionPly1 '+positionPly);

                //update player position
                positionPly += rollNum * 1;
                if(positionPly >= 100){
                    positionPly = 100;
                    alert('Player ' + player + ' wins');
                }

                positionPly = checkPosition(positionPly, "Player "+ player);
                document.getElementById('p'+player+'pos').innerHTML = positionPly;

                const el = document.getElementById('p'+player);
                if (el) {
                    el.remove();
                }

                console.log('positionPly '+positionPly);
                const box = document.getElementById("b" + positionPly);
                box.innerHTML += '<span id="p' + player +'">(P' + player +')</span>';

                document.getElementById('p' + player +'display').innerHTML = 'P'+player+ ': '+
                ShowDisplay(positionPly);
                
                if(rollNum !== 6)
                {
                    if (player >= playerCount){
                        setPlayer(1);
                    }else{
                        setPlayer(player + 1);
                    }

                    document.getElementById('playerTurn').innerHTML = 'Player '+player+' turn:';
                }

                document.getElementById('diceNumberTxt').value = Math.floor(Math.random() * 6) + 1;
            }

            return (
                <div>
                    <button onClick={HandleRoll}>Move</button>
                    <div style={{ display: "none" }}>
                    {Array.from({ length: playerCount }, (_, i) => (
                        <div key={i} id={`p${i + 1}pos`}>
                        0
                        </div>
                    ))}
                    </div>
                    <div>
                    {Array.from({ length: playerCount }, (_, i) => (
                        <div key={i} id={`p${i + 1}display`}></div>
                    ))}
                    </div>
                </div>
            );
        }

        const RDroot = ReactDOM.createRoot(document.getElementById("RollDiceRoot"));
        RDroot.render(<RollDiceRoot />);
    </script>
    <script>
    colorSnakesAndLadders();

    document.querySelectorAll('.box').forEach(div => {
        const id = div.id;
        const number = id.replace('b', '');
        
        if (div.innerText.trim() === '') {
            div.innerText = number;
        }
    });

    function ShowDisplay(boxnumber)
    {
        let display = "";

        if (boxnumber % 3 == 0)
            display += "foo";
        if (boxnumber % 4 == 0)
            display += "baz";
        if (boxnumber % 5 == 0)
            display += "bar";
        if (boxnumber % 7 == 0)
            display += "jazz";
        if (boxnumber % 9 == 0)
            display += "huzz";

        return display;
    }

    function SnakesAndLaddersBox()
    {
        return [
            [2, 38], [7, 14], [8, 31], [15, 26], [28, 84],
            [16, 6], [40, 11], [62, 19], [64, 60], [99, 80]
        ];
    }

    function checkPosition(position, player) {
        document.getElementById("positionMessage").innerHTML = "";
        const found = SnakesAndLaddersBox().find(([from]) => from === position);

        if (found) {
            const [from, to] = found;

            if (to > from) {
                console.log("Ladder! Go up 🚀");
                document.getElementById("positionMessage").innerHTML = 
                'Message: '+ player + ' going up 🚀, from ' + from +' to ' + to;
            } else {
                console.log("Snake! Go down 🐍");
                
                document.getElementById("positionMessage").innerHTML = 
                'Message: '+ player + ' going down 🐍, from ' + from +' to ' + to;
            }

            return to; // move player
        }

        return position;
    }

    function colorSnakesAndLadders() {

        const data = SnakesAndLaddersBox();

        data.forEach(([from, to]) => {
            const fromDiv = document.getElementById("b" + from);
            const toDiv = document.getElementById("b" + to);

            if (!fromDiv || !toDiv) return;

            if (to > from) {
                // Ladder → green
                fromDiv.style.backgroundColor = "green";
                toDiv.style.backgroundColor = "lightgreen";
            } else {
                // Snake → red
                fromDiv.style.backgroundColor = "red";
                toDiv.style.backgroundColor = "pink";
            }
        });
    }
    </script>
